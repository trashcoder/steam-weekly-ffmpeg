version: "3.8"

services:
  ffmpeg-api:
    build:
      context: https://github.com/DEIN-GITHUB-USER/DEIN-REPO-NAME.git
      dockerfile: ffmpeg-api/Dockerfile
    container_name: ffmpeg-api
    restart: unless-stopped
    ports:
      - "5679:5679"
    volumes:
      - /absoluter/pfad/zu/steam-bot-data:/data/steam-bot
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
