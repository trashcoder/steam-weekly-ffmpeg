version: "3.8"

services:
  ffmpeg-api:
    image: ghcr.io/trashcoder/ffmpeg-api:latest
    container_name: ffmpeg-api
    restart: unless-stopped
    ports:
      - "5679:5679"
    volumes:
      - steam_bot_data:/data/steam-bot
    networks:
      - n8n_default

volumes:
  steam_bot_data:
    external: true
    name: steam_bot_data

networks:
  n8n_default:
    external: true


